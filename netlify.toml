[functions]

  [functions.emails]
  included_files = [
    "./emails/**"
  ]

[context]

  [context.production]

    [context.production.functions]

      [context.production.functions.emails]
      included_files = [
        "./emails/**"
      ]

[[redirects]]
  from = "/podcast"
  to = "/podcasts"

[[redirects]]
  from = "/content-content-podcast"
  to = "/podcasts"

[[redirects]]
  from = "*professional-technical-writing-examples"
  to = "/static-site-generator"

[[redirects]]
  from = "*contact-ed-marsh-information-architect-technical-writer"
  to = "/contact"

[[plugins]]
package = "netlify-plugin-checklinks"
  [plugins.inputs]
  # Skip checks for Google Fonts domains that cause TLS/preconnect failures
  ignoreUrls = [
    "https://fonts.gstatic.com",
    "https://fonts.gstatic.com/*",
    "https://fonts.googleapis.com/*"
  ]
